<div class="employees-page">
  <div class="employees-table-title">
    <h2>Lista de Empleados</h2>
    <a mat-raised-button color="primary" routerLink="/employees/new">
      <mat-icon>add</mat-icon>
      Nuevo Empleado
    </a>
  </div>

  <div class="employees-table-container">
    <mat-form-field class="employees-table-filter">
      <mat-label>Filtro</mat-label>
      <input
        matInput
        (keyup)="applyFilter($event)"
        placeholder="Ej. Juanito Pérez"
        #input />
    </mat-form-field>

    <!-- Spinner de carga -->
    <div *ngIf="isLoading" class="employees-loading">
      <mat-spinner diameter="48"></mat-spinner>
    </div>

    <table
      *ngIf="!isLoading"
      mat-table
      [dataSource]="employeeDataSource"
      class="employees-table">
      <ng-container matColumnDef="Nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <ng-container matColumnDef="Apellido Paterno">
        <th mat-header-cell *matHeaderCellDef>Apellido Paterno</th>
        <td mat-cell *matCellDef="let element">{{ element.middleName }}</td>
      </ng-container>

      <ng-container matColumnDef="Apellido Materno">
        <th mat-header-cell *matHeaderCellDef>Apellido Materno</th>
        <td mat-cell *matCellDef="let element">{{ element.surName }}</td>
      </ng-container>

      <ng-container matColumnDef="CURP">
        <th mat-header-cell *matHeaderCellDef>CURP</th>
        <td mat-cell *matCellDef="let element">{{ element.curp }}</td>
      </ng-container>

      <ng-container matColumnDef="PhoneNumber">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let element">{{ element.phoneNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="Email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let element">{{ element.email }}</td>
      </ng-container>

      <ng-container matColumnDef="Acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-icon-button
            color="primary"
            (click)="onEdit(element.id)"
            matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="onDelete(element.id)"
            matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="employeeTableColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: employeeTableColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="7">
          No hay datos que coincidan con "{{ input.value }}"
        </td>
      </tr>
    </table>

    <mat-paginator
      *ngIf="!isLoading"
      [pageSizeOptions]="[10, 25, 50]"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
